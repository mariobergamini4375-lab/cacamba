    /* ============================================================
       PRORROGAR REMOÇÃO
    ============================================================ */

    let prorrogarCacambaId = null;

    function openProrrogar(id) {
      prorrogarCacambaId = id;
      const cacambas = getCacambas();
      const c = cacambas.find(x => x.id === id);
      if (!c) {
        toast('Caçamba não encontrada.', true);
        return;
      }

      if (c.tipoPagamento === 'mensalista') {
        toast('Não é possível prorrogar caçambas mensalistas.', true);
        return;
      }

      openModal(`
                            <div class="modal-head">
                              <h3>Prorrogar Remoção</h3>
                              <button class="modal-close" onclick="closeModal()">✕</button>
                            </div>
                            <div class="modal-body">
                              <div class="field2">
                                <label>Dias para prorrogação</label>
                                <input type="number" id="prorrogar-dias" min="1" step="1" placeholder="Ex: 3" style="font-size:18px;padding:12px;">
                                <div style="font-size:12px;color:var(--text-muted);margin-top:6px;">
                                  Prazo atual: <strong>${fmtDateTime(c.dataPrevistaRemocao)}</strong>
                                </div>
                              </div>
                            </div>
                            <div class="modal-foot">
                              <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
                              <button class="btn btn-primary" onclick="confirmProrrogar()" style="background:#6C63FF;border-color:#6C63FF;">Salvar</button>
                            </div>
                          `);

      setTimeout(() => {
        const input = document.getElementById('prorrogar-dias');
        if (input) {
          input.focus();
          input.select();
        }
      }, 100);
    }
    window.openProrrogar = openProrrogar;

    function confirmProrrogar() {
      const input = document.getElementById('prorrogar-dias');
      const diasStr = input ? input.value.trim() : '';

      if (diasStr === '') {
        toast('Informe uma quantidade válida de dias.', true);
        input.focus();
        return;
      }

      const dias = Number(diasStr);

      if (!Number.isInteger(dias) || dias <= 0) {
        toast('Informe um número inteiro positivo de dias.', true);
        input.value = '';
        input.focus();
        return;
      }

      const id = prorrogarCacambaId;
      const cacambas = getCacambas();
      const c = cacambas.find(x => x.id === id);
      if (!c) {
        toast('Caçamba não encontrada.', true);
        closeModal();
        return;
      }

      if (c.tipoPagamento === 'mensalista') {
        toast('Não é possível prorrogar caçambas mensalistas.', true);
        closeModal();
        return;
      }

      const prazoAtual = fmtDateTime(c.dataPrevistaRemocao);
      const novoPrazo = fmtDateTime(addDays(c.dataPrevistaRemocao, dias));

      openModal(`
                            <div class="modal-head">
                              <h3>Confirmar Prorrogação</h3>
                              <button class="modal-close" onclick="closeModal()">✕</button>
                            </div>
                            <div class="modal-body">
                              <p style="font-size:15px;text-align:center;margin-bottom:8px;">
                                Deseja realmente prorrogar o prazo de remoção desta caçamba?
                              </p>
                              <div style="background:var(--bg);border-radius:6px;padding:12px;margin:12px 0;">
                                <div style="display:flex;justify-content:space-between;padding:4px 0;">
                                  <span style="color:var(--text-muted);">Prazo atual:</span>
                                  <strong>${prazoAtual}</strong>
                                </div>
                                <div style="display:flex;justify-content:space-between;padding:4px 0;">
                                  <span style="color:var(--text-muted);">Dias a adicionar:</span>
                                  <strong>+${dias} dias</strong>
                                </div>
                                <div style="display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid var(--line);margin-top:4px;padding-top:8px;">
                                  <span style="color:var(--text-muted);">Novo prazo:</span>
                                  <strong style="color:var(--ok);">${novoPrazo}</strong>
                                </div>
                              </div>
                              <div class="confirm-buttons">
                                <button class="btn btn-ghost" onclick="closeModal()">Não</button>
                                <button class="btn btn-primary" onclick="executarProrrogar(${dias})" style="background:#6C63FF;border-color:#6C63FF;">Sim</button>
                              </div>
                            </div>
                          `);
    }
    window.confirmProrrogar = confirmProrrogar;

    async function executarProrrogar(dias) {
      const id = prorrogarCacambaId;
      const cacambas = getCacambas();
      const c = cacambas.find(x => x.id === id);
      if (!c) {
        toast('Caçamba não encontrada.', true);
        closeModal();
        return;
      }

      const novoPrazo = addDays(c.dataPrevistaRemocao, dias);

      c.prorrogacoes = c.prorrogacoes || [];
      c.prorrogacoes.push({
        dataHora: new Date().toISOString(),
        diasProrrogados: dias,
        prazoAnterior: c.dataPrevistaRemocao,
        novoPrazo: novoPrazo
      });

      c.dataPrevistaRemocao = novoPrazo;

      await saveDB(DB);
      closeModal();
      toast('Prazo para remoção prorrogado com sucesso.');
      boot();
    }
    window.executarProrrogar = executarProrrogar;

    function filterGeral() {
      const de = document.getElementById('fl-de')?.value;
      const ate = document.getElementById('fl-ate')?.value;
      const motCol = document.getElementById('fl-motorista-colocacao')?.value;
      const motRem = document.getElementById('fl-motorista-remocao')?.value;
      const local = document.getElementById('fl-local')?.value;
      const cliente = document.getElementById('fl-cliente-geral')?.value?.toLowerCase() || '';
      const cidade = document.getElementById('fl-cidade-geral')?.value || '';

      const cacambas = getCacambas();
      let list = cacambas.filter(c => c.status === 'removido' && !c.excluido);

      if (de) list = list.filter(c => isoDateOnly(c.dataHoraRemocao) >= de);
      if (ate) list = list.filter(c => isoDateOnly(c.dataHoraRemocao) <= ate);

      if (motCol) {
        const motColNorm = normalizarTexto(motCol);
        list = list.filter(c => normalizarTexto(c.motoristaColocacao) === motColNorm);
      }

      if (motRem) {
        const motRemNorm = normalizarTexto(motRem);
        list = list.filter(c => normalizarTexto(c.motoristaRemocao) === motRemNorm);
      }

      if (local) {
        const localNorm = normalizarTexto(local);
        list = list.filter(c => normalizarTexto(c.localDescarte) === localNorm);
      }

      if (cliente) {
        const clienteNorm = normalizarTexto(cliente);
        list = list.filter(c => normalizarTexto(c.nome).includes(clienteNorm));
      }

      if (cidade) {
        const cidadeNorm = normalizarTexto(cidade);
        list = list.filter(c => normalizarTexto(c.cidade) === cidadeNorm);
      }

      list.sort((a, b) => (b.dataHoraRemocao || '').localeCompare(a.dataHoraRemocao || ''));

      document.getElementById('geral-results').innerHTML = `
                        <div class="table-wrap">
                          ${list.length ? `<table><thead><tr>
                            <th>Cliente</th><th>Endereço</th><th>Tipo de Material</th><th>Data Colocação</th><th>Motorista Colocação</th><th>Data Remoção</th><th>Motorista Remoção</th><th>Local Descarte</th><th>Material Recolhido</th><th>Plano</th><th>Valor</th><th>Pagamento</th><th>Intercorrência</th><th>Ações</th>
                          </tr></thead><tbody>

        const intercorrenciaLabel = c.intercorrencia ?
          (c.intercorrencia === 'nao_houve' ? 'Não houve intercorrência' : c.intercorrencia) :
          'Não informado';

                              <td>${montarEndereco(c)}</td>
                              <td>${esc(c.tipoMaterial || '—')}</td>
                              <td>${fmtDateTime(c.dataHoraColocacao)}</td>
                              <td>${esc(c.motoristaColocacao || '—')}</td>
                              <td>${fmtDateTime(c.dataHoraRemocao)}</td>
                              <td>${esc(c.motoristaRemocao || '—')}</td>
                              <td>${esc(c.localDescarte || '—')}</td>
                              <td>${esc(c.materialRecolhido || '—')}</td>
                              <td>${esc(c.planoNome || '—')}</td>
                              <td>${esc(c.valor)}</td>
                              <td>${labelPagamento(c.tipoPagamento)}</td>
                              <td>${esc(intercorrenciaLabel)}</td>
                              <td class="actions-cell">
                                <button class="icon-btn" title="Editar" onclick="openRemocaoEdit('${c.id}')">✎</button>
                                <button class="icon-btn btn-excluir" title="Excluir" onclick="confirmarExclusaoGeral('${c.id}')">🗑</button>
                              </td>
                            </tr>`;
      }).join('')}
                          </tbody></table>` : `<div class="empty-state"><div class="big">📁</div>Nenhum registro encontrado para os filtros aplicados.</div>`}
                        </div>
                      `;

    async function addCidade() {
      const input = document.getElementById('new-cidade');
      const val = input.value.trim();
      if (!val) { toast('Digite o nome da cidade.', true); return; }

      const cidades = getCidades();
      const valNorm = normalizarTexto(val);
      if (cidades.some(c => normalizarTexto(c.nome) === valNorm)) {
        toast('Esta cidade já está cadastrada.', true);
        input.value = '';
        input.focus();
        return;
      }

      try {
        const novoItem = { id: uid(), nome: val };
        addOwnerId(novoItem);
        DB.cidades.push(novoItem);
        await saveDB(DB);
        toast('Cidade adicionada com sucesso.');
        renderConfiguracoes();
      } catch (e) {
        toast('Erro ao adicionar cidade: ' + e.message, true);
      }
    }
    window.addCidade = addCidade;

    async function removerCidade(id) {
      if (!confirm('Tem certeza que deseja excluir esta cidade?')) return;
      const index = DB.cidades.findIndex(c => c.id === id);
      if (index === -1) return;
      if (!hasAccessToItem(DB.cidades[index])) { toast('Acesso negado.', true); return; }
      DB.cidades.splice(index, 1);
      await saveDB(DB);
      toast('Cidade removida.');
      renderConfiguracoes();
    }
    window.removerCidade = removerCidade;

    function editarCidade(id) {
      const cidades = getCidades();
      const item = cidades.find(c => c.id === id);
      if (!item) { toast('Cidade não encontrada.', true); return; }

      const tag = document.getElementById('tag-cidade-' + id);
      if (!tag) return;

      const textSpan = tag.querySelector('.cidade-text');
      const currentText = textSpan.textContent;

      const input = document.createElement('input');
      input.type = 'text';
      input.value = currentText;
      input.style.cssText =
        'background:var(--bg);color:var(--text);border:1px solid var(--orange);border-radius:4px;padding:2px 6px;font-size:12px;width:auto;min-width:100px;';

      const btnSalvar = document.createElement('button');
      btnSalvar.textContent = '✓';
      btnSalvar.title = 'Salvar';
      btnSalvar.style.cssText =
        'background:var(--ok);color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;';

      const btnCancelar = document.createElement('button');
      btnCancelar.textContent = '✕';
      btnCancelar.title = 'Cancelar';
      btnCancelar.style.cssText =
        'background:var(--danger);color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;';

      tag.innerHTML = '';
      tag.appendChild(input);
      tag.appendChild(btnSalvar);
      tag.appendChild(btnCancelar);

      input.focus();
      input.select();

      btnSalvar.onclick = function () {
        const novoNome = input.value.trim();
        if (!novoNome) { toast('Digite um nome válido.', true); return; }

        const cidadesAtuais = getCidades();
        const novoNomeNorm = normalizarTexto(novoNome);
        if (cidadesAtuais.some(c => c.id !== id && normalizarTexto(c.nome) === novoNomeNorm)) {
          toast('Já existe uma cidade com este nome.', true);
          return;
        }

        item.nome = novoNome;
        saveDB(DB);
        toast('Cidade atualizada.');
        renderConfiguracoes();
      };

      btnCancelar.onclick = function () {
        renderConfiguracoes();
      };

      input.onkeydown = function (e) {
        if (e.key === 'Enter') {
          btnSalvar.click();
        } else if (e.key === 'Escape') {
          btnCancelar.click();
        }
      };
    }
    window.editarCidade = editarCidade;

    async function addPlano() {
      const nome = document.getElementById('new-plano-nome').value.trim();
      const dias = parseInt(document.getElementById('new-plano-dias').value);
      const valor = document.getElementById('new-plano-valor').value.trim();

      if (!nome) { toast('Digite o nome do plano.', true); return; }
      if (isNaN(dias) || dias <= 0) {
        toast('Digite uma quantidade de dias válida (número inteiro positivo).', true);
        return;
      }
      if (!valor) { toast('Digite o valor do plano.', true); return; }

      const planos = getPlanos();
      const nomeNorm = normalizarTexto(nome);
      if (planos.some(p => normalizarTexto(p.nome) === nomeNorm)) {
        toast('Já existe um plano com este nome.', true);
        return;
      }

      try {
        const novoItem = { id: uid(), nome, dias, valor };
        addOwnerId(novoItem);
        DB.planos.push(novoItem);
        await saveDB(DB);
        toast('Plano adicionado com sucesso.');
        renderConfiguracoes();
      } catch (e) {
        toast('Erro ao adicionar plano: ' + e.message, true);
      }
    }
    window.addPlano = addPlano;

    async function addConfigItem(list, inputId) {
      const input = document.getElementById(inputId);
      const val = input.value.trim();
      if (!val) { toast('Digite um valor antes de adicionar.', true); return; }
      if (list === 'planos') {
        await addPlano();
        return;
      }

      const items = getItemsFromList(list);
      const valNorm = normalizarTexto(val);
      const key = list === 'valores' ? 'valor' : 'nome';
      if (items.some(item => normalizarTexto(item[key]) === valNorm)) {
        toast('Este item já está cadastrado.', true);
        input.value = '';
        input.focus();
        return;
      }

      try {
        const novoItem = { id: uid(), [key]: val };
        addOwnerId(novoItem);
        DB[list].push(novoItem);
        await saveDB(DB);
        toast('Adicionado com sucesso.');
        renderConfiguracoes();
      } catch (e) {
        toast('Erro ao adicionar: ' + e.message, true);
      }
    }
    window.addConfigItem = addConfigItem;

    function getItemsFromList(list) {
      return filterByOwner(DB[list] || []);
    }

    async function removeConfigItem(list, id) {
      if (!confirm('Remover este item da lista?')) return;
      const index = DB[list].findIndex(x => x.id === id);
      if (index === -1) return;
      if (!hasAccessToItem(DB[list][index])) { toast('Acesso negado.', true); return; }
      DB[list].splice(index, 1);
      await saveDB(DB);
      toast('Item removido.');
      renderConfiguracoes();
    }

      const email = document.getElementById('u-email').value.trim().toLowerCase();

      ];

      });

      if (!nome || !email) { toast('Preencha nome e e-mail.', true); return; }

      const exists = DB.users.find(u => u.email.toLowerCase() === email && u.id !== id && u.role === 'user' && u.ownerId === user.id);
      if (exists) { toast('Já existe um usuário com este e-mail.', true); return; }

      if (id) {
        const u = DB.users.find(x => x.id === id);
        if (!u || u.role !== 'user' || u.ownerId !== user.id) {
          toast('Usuário não encontrado.', true);

        u.nome = nome;
        u.email = email;
        u.permissoes = permissoes;

      if (dataInicio) {
        list = list.filter(c => c.dataHoraRemocao && isoDateOnly(c.dataHoraRemocao) >= dataInicio);
      }
      if (dataFim) {
        list = list.filter(c => c.dataHoraRemocao && isoDateOnly(c.dataHoraRemocao) <= dataFim);
      }

      if (cidade) {
        const cidadeNorm = normalizarTexto(cidade);
        list = list.filter(c => normalizarTexto(c.cidade) === cidadeNorm);
      }

      if (motorista) {
        const motoristaNorm = normalizarTexto(motorista);
        list = list.filter(c =>
          normalizarTexto(c.motoristaColocacao) === motoristaNorm ||
          normalizarTexto(c.motoristaRemocao) === motoristaNorm
        );
      }

      if (pagamento) list = list.filter(c => c.tipoPagamento === pagamento);

      if (materialRecolhido) {
        const materialNorm = normalizarTexto(materialRecolhido);
        list = list.filter(c => {
          if (!c.materialRecolhido) return false;
          return normalizarTexto(c.materialRecolhido).includes(materialNorm);
        });
      }

      return list;
    }

    function updateFinanceiroCards(data) {
      const totalRecebido = data.reduce((sum, c) => sum + safeNumber(c.valor), 0);
      document.getElementById('card-total-recebido').textContent = formatCurrency(totalRecebido);

      const pendentes = data.filter(c => !c.pago);
      const totalAberto = pendentes.reduce((sum, c) => sum + safeNumber(c.valor), 0);
      document.getElementById('card-total-aberto').textContent = formatCurrency(totalAberto);

      document.getElementById('card-qtd-colocadas').textContent = data.length;
      document.getElementById('card-qtd-remocoes').textContent = data.length;

      const ticketMedio = data.length > 0 ? totalRecebido / data.length : 0;
      document.getElementById('card-ticket-medio').textContent = formatCurrency(ticketMedio);

      const clientesUnicos = new Set(data.map(c => normalizarTexto(c.nome)));
      document.getElementById('card-total-clientes').textContent = clientesUnicos.size;

      const cidades = {};
      data.forEach(c => {
        if (c.cidade) {
          const cidadeNorm = normalizarTexto(c.cidade);
          if (!cidades[cidadeNorm]) cidades[cidadeNorm] = { total: 0, count: 0, nome: c.cidade };
          cidades[cidadeNorm].total += safeNumber(c.valor);
          cidades[cidadeNorm].count += 1;
        }
      });
      let cidadeMedia = '—';
      let maiorMedia = 0;
      for (const [norm, info] of Object.entries(cidades)) {
        const media = info.total / info.count;
        if (media > maiorMedia) {
          maiorMedia = media;
          cidadeMedia = `${info.nome} (${formatCurrency(media)})`;
        }
      }
      document.getElementById('card-media-cidade').textContent = cidadeMedia;

      const pagamentos = {};
      data.forEach(c => {
        const tipo = c.tipoPagamento || 'outros';
        if (!pagamentos[tipo]) pagamentos[tipo] = 0;
        pagamentos[tipo] += 1;
      });
      let maxPag = 0;
      let maxPagNome = '—';
      for (const [tipo, count] of Object.entries(pagamentos)) {
        if (count > maxPag) {
          maxPag = count;
          maxPagNome = labelPagamento(tipo);
        }
      }
      document.getElementById('card-pagamento-mais').textContent = maxPagNome;

      const total = data.length || 1;
      const pagPercent = {};
      for (const [tipo, count] of Object.entries(pagamentos)) {
        pagPercent[tipo] = (count / total * 100).toFixed(1);
      }
      const pagHtml = Object.entries(pagamentos).map(([tipo, count]) => {
        const pct = pagPercent[tipo] || '0';
        return `<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid var(--line);">
                                  <span>${labelPagamento(tipo)}</span>
                                  <span><strong>${pct}%</strong> (${count})</span>
                                </div>`;
      }).join('');
      document.getElementById('card-pagamento-detalhes').innerHTML = pagHtml ||
        '<span style="color:var(--text-muted);font-size:12px;">Nenhum dado</span>';
    }

    function updateFinanceiroCharts(data) {
      destroyCharts();

      const meses = {};
      data.forEach(c => {
        const dataRef = c.dataHoraRemocao || c.dataHoraColocacao;
        if (dataRef) {
          const d = new Date(dataRef);
          const mesAno = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
          if (!meses[mesAno]) meses[mesAno] = 0;
          meses[mesAno] += safeNumber(c.valor);
        }
      });
      const sortedMeses = Object.keys(meses).sort();
      const labels = sortedMeses.map(m => {
        const [ano, mes] = m.split('-');
        return `${mes}/${ano.slice(2)}`;
      });
      const values = sortedMeses.map(m => meses[m]);

      const ctx1 = document.getElementById('chart-faturamento')?.getContext('2d');
      if (ctx1) {
        chartFaturamento = new Chart(ctx1, {
          type: 'bar',
          data: {
            labels: labels.length ? labels : ['Sem dados'],
            datasets: [{
              label: 'Faturamento (R$)',
              data: labels.length ? values : [0],
              backgroundColor: 'rgba(255, 106, 19, 0.7)',
              borderColor: '#FF6A13',
              borderWidth: 2,
              borderRadius: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, ticks: { callback: v => 'R$ ' + v.toFixed(0) } }
            }
          }
        });
      }

      const cidades = {};
      data.forEach(c => {
        if (c.cidade) {
          const cidadeNorm = normalizarTexto(c.cidade);
          if (!cidades[cidadeNorm]) cidades[cidadeNorm] = { count: 0, nome: c.cidade };
          cidades[cidadeNorm].count += 1;
        }
      });
      const sortedCidades = Object.entries(cidades).sort((a, b) => b[1].count - a[1].count);
      const cidadesLabels = sortedCidades.map(([, info]) => info.nome);
      const cidadesValues = sortedCidades.map(([, info]) => info.count);

      const ctx2 = document.getElementById('chart-cidades')?.getContext('2d');
      if (ctx2) {
        chartCidades = new Chart(ctx2, {
          type: 'bar',
          data: {
            labels: cidadesLabels.length ? cidadesLabels : ['Sem dados'],
            datasets: [{
              label: 'Serviços',
              data: cidadesLabels.length ? cidadesValues : [0],
              backgroundColor: 'rgba(46, 64, 87, 0.7)',
              borderColor: '#2E4057',
              borderWidth: 2,
              borderRadius: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
          }
        });
      }

      const pagamentos = {};
      data.forEach(c => {
        const tipo = c.tipoPagamento || 'outros';
        if (!pagamentos[tipo]) pagamentos[tipo] = 0;
        pagamentos[tipo] += 1;
      });
      const pagLabels = Object.keys(pagamentos).map(k => labelPagamento(k));
      const pagValues = Object.values(pagamentos);
      const cores = ['#FF6A13', '#2E4057', '#2FA35E', '#E8B023', '#D8453A', '#6C63FF'];

      const ctx3 = document.getElementById('chart-pagamentos')?.getContext('2d');
      if (ctx3) {
        chartPagamentos = new Chart(ctx3, {
          type: 'doughnut',
          data: {
            labels: pagLabels.length ? pagLabels : ['Sem dados'],
            datasets: [{
              data: pagLabels.length ? pagValues : [1],
              backgroundColor: pagLabels.length ? cores.slice(0, pagLabels.length) : ['#ccc'],
              borderWidth: 2,
              borderColor: 'var(--surface)'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8, font: { size: 10 } } }
            }
          }
        });
      }

      const colocacoes = data.length;
      const remocoes = data.length;
      const ctx4 = document.getElementById('chart-colocacoes-remocoes')?.getContext('2d');
      if (ctx4) {
        chartColocacoesRemocoes = new Chart(ctx4, {
          type: 'bar',
          data: {
            labels: ['Colocações', 'Remoções'],
            datasets: [{
              label: 'Quantidade',
              data: [colocacoes, remocoes],
              backgroundColor: ['rgba(255, 106, 19, 0.7)', 'rgba(46, 64, 87, 0.7)'],
              borderColor: ['#FF6A13', '#2E4057'],
              borderWidth: 2,
              borderRadius: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
          }
        });
      }
    }

    function renderFrotaRelatorioAbastecimento() {
      let abastecimentos = getAbastecimentos();
      abastecimentos.sort((a, b) => (b.dataHora || '').localeCompare(a.dataHora || ''));

      const veiculos = getVeiculos();
      const motoristas = getMotoristasFrota();

      const abastecimentosComCalculos = abastecimentos.map((a, index, arr) => {
        const anteriores = arr.filter(item =>
          item.veiculoId === a.veiculoId &&
          item.dataHora < a.dataHora
        ).sort((x, y) => (y.dataHora || '').localeCompare(x.dataHora || ''));

        const anterior = anteriores.length > 0 ? anteriores[0] : null;

        let kmRodado = null;
        let mediaKmLitro = null;

        if (anterior && a.km && anterior.km) {
          kmRodado = parseFloat(a.km) - parseFloat(anterior.km);
          if (kmRodado > 0 && a.litros && parseFloat(a.litros) > 0) {
            mediaKmLitro = kmRodado / parseFloat(a.litros);
          }
        }

        return {
          ...a,
          kmRodado: kmRodado,
          mediaKmLitro: mediaKmLitro
        };
      });

      const totalLitros = abastecimentos.reduce((sum, a) => sum + safeNumber(a.litros), 0);
      const totalGasto = abastecimentos.reduce((sum, a) => sum + safeNumber(a.valorTotal), 0);
      const precoMedio = totalLitros > 0 ? totalGasto / totalLitros : 0;
      const qtdAbastecimentos = abastecimentos.length;

      const mediaPorVeiculo = {};
      const veiculosIds = [...new Set(abastecimentos.map(a => a.veiculoId))];
      veiculosIds.forEach(vId => {
        const items = abastecimentos.filter(a => a.veiculoId === vId);
        const totalLitrosV = items.reduce((sum, a) => sum + safeNumber(a.litros), 0);
        const totalGastoV = items.reduce((sum, a) => sum + safeNumber(a.valorTotal), 0);
        const precoMedioV = totalLitrosV > 0 ? totalGastoV / totalLitrosV : 0;
        const litrosMedioV = items.length > 0 ? totalLitrosV / items.length : 0;
        const veiculo = veiculos.find(v => v.id === vId);
        mediaPorVeiculo[vId] = {
          placa: veiculo ? veiculo.placa : '—',
          totalLitros: totalLitrosV,
          totalGasto: totalGastoV,
          precoMedio: precoMedioV,
          litrosMedio: litrosMedioV,
          qtd: items.length,
          ultimo: items.length > 0 ? items[0].dataHora : null
        };
      });

      const html = `
        <div class="page-head">
          <div><h1>📋 Relatório de Abastecimento</h1><div class="sub">Visão completa de todos os abastecimentos</div></div>
          <button class="btn btn-ghost btn-sm" onclick="renderFrotaAbastecimento()">← Voltar</button>
        </div>

          <div class="field2">
            <label>Data Inicial</label>
            <input type="date" id="f-abast-data-inicio" onchange="applyAbastecimentoFilters()">
          </div>
          <div class="field2">
            <label>Data Final</label>
            <input type="date" id="f-abast-data-fim" onchange="applyAbastecimentoFilters()">
          </div>
          <div class="field2">
            <label>Veículo</label>
            <select id="f-abast-veiculo" onchange="applyAbastecimentoFilters()">
              <option value="">Todos</option>
              ${veiculos.map(v => `<option value="${v.id}">${esc(v.placa)}</option>`).join('')}
            </select>
          </div>
          <div class="field2">
            <label>Motorista</label>
            <select id="f-abast-motorista" onchange="applyAbastecimentoFilters()">
              <option value="">Todos</option>
              ${motoristas.map(m => `<option value="${m.id}">${esc(m.nome)}</option>`).join('')}
            </select>
          </div>
          <div class="field2">
            <label>Posto</label>
            <input type="text" id="f-abast-posto" placeholder="Filtrar por posto..." oninput="applyAbastecimentoFilters()">
          </div>
        </div>

        <div id="abastecimento-table-container">
          ${renderAbastecimentoTable(abastecimentosComCalculos)}
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    function applyAbastecimentoFilters() {
      const dataInicio = document.getElementById('f-abast-data-inicio')?.value || '';
      const dataFim = document.getElementById('f-abast-data-fim')?.value || '';
      const veiculoId = document.getElementById('f-abast-veiculo')?.value || '';
      const motoristaId = document.getElementById('f-abast-motorista')?.value || '';
      const posto = document.getElementById('f-abast-posto')?.value?.toLowerCase() || '';

      let abastecimentos = getAbastecimentos();

      if (dataInicio) {
        abastecimentos = abastecimentos.filter(a => a.dataHora && isoDateOnly(a.dataHora) >= dataInicio);
      }
      if (dataFim) {
        abastecimentos = abastecimentos.filter(a => a.dataHora && isoDateOnly(a.dataHora) <= dataFim);
      }
      if (veiculoId) {
        abastecimentos = abastecimentos.filter(a => a.veiculoId === veiculoId);
      }
      if (motoristaId) {
        abastecimentos = abastecimentos.filter(a => a.motoristaId === motoristaId);
      }
      if (posto) {
        abastecimentos = abastecimentos.filter(a => normalizarTexto(a.posto || '').includes(normalizarTexto(posto)));
      }

      abastecimentos.sort((a, b) => (b.dataHora || '').localeCompare(a.dataHora || ''));

      const abastecimentosComCalculos = abastecimentos.map((a, index, arr) => {
        const anteriores = arr.filter(item =>
          item.veiculoId === a.veiculoId &&
          item.dataHora < a.dataHora
        ).sort((x, y) => (y.dataHora || '').localeCompare(x.dataHora || ''));

        const anterior = anteriores.length > 0 ? anteriores[0] : null;

        let kmRodado = null;
        let mediaKmLitro = null;

        if (anterior && a.km && anterior.km) {
          kmRodado = parseFloat(a.km) - parseFloat(anterior.km);
          if (kmRodado > 0 && a.litros && parseFloat(a.litros) > 0) {
            mediaKmLitro = kmRodado / parseFloat(a.litros);
          }
        }

        return {
          ...a,
          kmRodado: kmRodado,
          mediaKmLitro: mediaKmLitro
        };
      });

      renderAbastecimentoTable(abastecimentosComCalculos);
    }
    window.applyAbastecimentoFilters = applyAbastecimentoFilters;

    async function saveOS(id) {
      const veiculoId = document.getElementById('f-os-veiculo-form').value;
      const motoristaId = document.getElementById('f-os-motorista-form').value;
      const tipo = document.getElementById('f-os-tipo').value;
      const prioridade = document.getElementById('f-os-prioridade').value;
      const km = parseFloat(document.getElementById('f-os-km').value) || 0;
      const horimetro = parseFloat(document.getElementById('f-os-horimetro').value) || 0;
      const descricao = document.getElementById('f-os-descricao').value.trim();
      const observacoes = document.getElementById('f-os-obs').value.trim();

      if (!veiculoId) { toast('Selecione um veículo.', true); return; }
      if (!motoristaId) { toast('Selecione um motorista.', true); return; }
      if (!descricao) { toast('Descreva o problema ou serviço.', true); return; }

      const now = new Date().toISOString();

      if (id) {
        const ordens = getOrdensServico();
        const o = ordens.find(x => x.id === id);
        if (!o) { toast('OS não encontrada.', true); return; }
        if (!hasAccessToItem(o)) { toast('Acesso negado.', true); return; }

        o.veiculoId = veiculoId;
        o.motoristaId = motoristaId;
        o.tipo = tipo;
        o.prioridade = prioridade;
        o.km = km;
        o.horimetro = horimetro;
        o.descricao = descricao;
        o.observacoes = observacoes;

        await saveDB(DB);
        closeModal();
        toast('OS atualizada com sucesso.');
      } else {
        try {
          const ordens = getOrdensServico();
          const numeroOS = ordens.length + 1;

          const novaOS = {
            id: uid(),
            numeroOS,
            veiculoId,
            motoristaId,
            tipo,
            prioridade,
            km,
            horimetro,
            descricao,
            observacoes,
            status: 'aberta',
            dataAbertura: now,
            custoReal: null,
            mecanico: null,
            dataConclusao: null,
            observacaoConclusao: null
          };
          addOwnerId(novaOS);
          DB.ordensServico.push(novaOS);
          await saveDB(DB);

          closeModal();
          toast('OS criada com sucesso! Nº #' + numeroOS);
        } catch (e) {
          toast('Erro ao criar OS: ' + e.message, true);
          return;
        }
      }

      boot();
    }
    window.saveOS = saveOS;

    async function deleteOS(id) {
      if (!confirm('Tem certeza que deseja excluir esta ordem de serviço?')) return;

      const ordens = getOrdensServico();
      const o = ordens.find(x => x.id === id);
      if (!o) { toast('OS não encontrada.', true); return; }

      if (!hasAccessToItem(o)) { toast('Acesso negado.', true); return; }

      DB.ordensServico = DB.ordensServico.filter(x => x.id !== id);
      await saveDB(DB);
      toast('OS excluída.');
      boot();
    }
    window.deleteOS = deleteOS;

    async function saveAtualizarOS(id) {
      const ordens = getOrdensServico();
      const o = ordens.find(x => x.id === id);
      if (!o) { toast('OS não encontrada.', true); return; }
      if (!hasAccessToItem(o)) { toast('Acesso negado.', true); return; }

      const status = document.getElementById('f-os-status-update').value;
      const custoReal = parseFloat(document.getElementById('f-os-custo').value) || null;
      const mecanico = document.getElementById('f-os-mecanico').value.trim();
      const dataConclusao = document.getElementById('f-os-data-conclusao').value;
      const observacaoConclusao = document.getElementById('f-os-obs-conclusao').value.trim();

      const statusAnterior = o.status;

      o.status = status;
      o.custoReal = custoReal;
      o.mecanico = mecanico;
      o.observacaoConclusao = observacaoConclusao;

      if (dataConclusao) {
        const dataConclusaoObj = new Date(dataConclusao + 'T' + new Date().toTimeString().slice(0, 8));
        o.dataConclusao = dataConclusaoObj.toISOString();
      } else if (status === 'concluida' || status === 'cancelada') {
        o.dataConclusao = new Date().toISOString();
      } else {
        o.dataConclusao = null;
      }

      await saveDB(DB);

      if ((status === 'concluida' || status === 'cancelada') && statusAnterior !== status) {
        const historicoItem = {
          id: uid(),
          osId: o.id,
          numeroOS: o.numeroOS,
          veiculoId: o.veiculoId,
          motoristaId: o.motoristaId,
          tipo: o.tipo,
          prioridade: o.prioridade,
          descricao: o.descricao,
          statusFinal: status,
          custo: custoReal,
          mecanico: mecanico,
          observacao: observacaoConclusao,
          dataAbertura: o.dataAbertura,
          dataConclusao: o.dataConclusao,
          dataArquivamento: new Date().toISOString()
        };
        addOwnerId(historicoItem);
        DB.historicoOS.push(historicoItem);

        DB.ordensServico = DB.ordensServico.filter(x => x.id !== id);

        toast('OS #' + o.numeroOS + ' ' + (status === 'concluida' ? 'concluída' : 'cancelada') +
          ' e movida para o histórico.');
      } else {
        toast('OS atualizada com sucesso.');
      }

      closeModal();
      boot();
    }

    function renderHistoricoOSTable(historico) {
      const veiculos = getVeiculos();
      const motoristas = getMotoristasFrota();

      if (historico.length === 0) {
        return `<div class="empty-state"><div class="big">📜</div>Nenhuma ordem no histórico.<br>As ordens concluídas ou canceladas aparecerão aqui.</div>`;
      }

      let html = `<div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nº OS</th>
              <th>Data Abertura</th>
              <th>Hora Abertura</th>
              <th>Veículo</th>
              <th>Motorista</th>
              <th>Tipo</th>
              <th>Prioridade</th>
              <th>Status Final</th>
              <th>Custo</th>
              <th>Mecânico</th>
              <th>Observação</th>
              <th>Data Conclusão</th>
              <th>Hora Conclusão</th>
            </tr>
          </thead>
          <tbody>`;

      historico.forEach(h => {
        const veiculo = veiculos.find(v => v.id === h.veiculoId);
        const motorista = motoristas.find(m => m.id === h.motoristaId);
        const statusClass = h.statusFinal || 'concluida';
        const tipoClass = h.tipo || 'outros';
        const prioridadeClass = h.prioridade || 'normal';

        const dataAbertura = h.dataAbertura ? new Date(h.dataAbertura) : null;
        const dataConclusao = h.dataConclusao ? new Date(h.dataConclusao) : null;

        html += `<tr>
          <td><strong>#${h.numeroOS || h.osId?.slice(0, 6) || '—'}</strong></td>
          <td>${dataAbertura ? dataAbertura.toLocaleDateString('pt-BR') : '—'}</td>
          <td>${dataAbertura ? dataAbertura.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '—'}</td>
          <td>${esc(veiculo ? veiculo.placa : '—')}</td>
          <td>${esc(motorista ? motorista.nome : '—')}</td>
          <td><span class="tipo-manutencao ${tipoClass}">${getTipoManutencaoLabel(h.tipo)}</span></td>
          <td><span class="prioridade-os ${prioridadeClass}">${getPrioridadeLabel(h.prioridade)}</span></td>
          <td><span class="status-os ${statusClass}">${getStatusOSLabel(h.statusFinal)}</span></td>
          <td>${h.custo ? formatCurrency(h.custo) : '—'}</td>
          <td>${esc(h.mecanico || '—')}</td>
          <td style="max-width:150px;white-space:normal;word-break:break-word;">${esc(h.observacao || '—')}</td>
          <td>${dataConclusao ? dataConclusao.toLocaleDateString('pt-BR') : '—'}</td>
          <td>${dataConclusao ? dataConclusao.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '—'}</td>
        </tr>`;
      });

      html += `</tbody></table>
        <div class="table-footer">
          <div class="total-item">📋 <span>Total de registros:</span> ${historico.length}</div>
          <div class="total-item">💰 <span>Custo Total:</span> ${formatCurrency(historico.reduce((sum, h) => sum + safeNumber(h.custo), 0))}</div>
        </div>
      </div>`;

      return html;
    }

    function applyHistoricoOSFilters() {
      const status = document.getElementById('f-historico-status')?.value || '';
      const dataInicio = document.getElementById('f-historico-data-inicio')?.value || '';
      const dataFim = document.getElementById('f-historico-data-fim')?.value || '';
      const veiculoId = document.getElementById('f-historico-veiculo')?.value || '';
      const motoristaId = document.getElementById('f-historico-motorista')?.value || '';
      const tipo = document.getElementById('f-historico-tipo')?.value || '';
      const mecanico = document.getElementById('f-historico-mecanico')?.value?.toLowerCase() || '';

      let historico = getHistoricoOS();

      if (status) {
        historico = historico.filter(h => h.statusFinal === status);
      }
      if (dataInicio) {
        historico = historico.filter(h => h.dataConclusao && isoDateOnly(h.dataConclusao) >= dataInicio);
      }
      if (dataFim) {
        historico = historico.filter(h => h.dataConclusao && isoDateOnly(h.dataConclusao) <= dataFim);
      }
      if (veiculoId) {
        historico = historico.filter(h => h.veiculoId === veiculoId);
      }
      if (motoristaId) {
        historico = historico.filter(h => h.motoristaId === motoristaId);
      }
      if (tipo) {
        historico = historico.filter(h => h.tipo === tipo);
      }
      if (mecanico) {
        historico = historico.filter(h => normalizarTexto(h.mecanico || '').includes(normalizarTexto(mecanico)));
      }

      historico.sort((a, b) => (b.dataArquivamento || '').localeCompare(a.dataArquivamento || ''));

      const container = document.getElementById('historico-os-table-container');
      if (container) {
        container.innerHTML = renderHistoricoOSTable(historico);
      }
    }
    window.applyHistoricoOSFilters = applyHistoricoOSFilters;

    function optionsTiposServico(selected) {
      const tipos = getTiposServico();
      if (!tipos.length) return `<option value="">Nenhum tipo cadastrado</option>`;
      const sorted = [...tipos].sort((a, b) => a.nome.localeCompare(b.nome));
      return sorted.map(t =>
        `<option value="${esc(t.nome)}" ${selected === t.nome ? 'selected' : ''}>${esc(t.nome)}</option>`
      ).join('');

    async function addTipoServico() {
      const input = document.getElementById('new-tipo-servico');
      const val = input.value.trim();
      if (!val) { toast('Digite o nome do tipo de serviço.', true); return; }

      const tipos = getTiposServico();
      const valNorm = normalizarTexto(val);
      if (tipos.some(t => normalizarTexto(t.nome) === valNorm)) {
        toast('Este tipo de serviço já está cadastrado.', true);
        input.value = '';
        input.focus();
        return;
      }

      try {
        const novoItem = { id: uid(), nome: val };
        addOwnerId(novoItem);
        DB.servicos_tipos.push(novoItem);
        await saveDB(DB);
        toast('Tipo de serviço adicionado com sucesso.');
        if (servicosSubView === 'configuracoes-servicos') {
          renderServicosTab('configuracoes-servicos');
        }
      } catch (e) {
        toast('Erro ao adicionar tipo de serviço: ' + e.message, true);
      }
    }
    window.addTipoServico = addTipoServico;

    async function removerTipoServico(id) {
      if (!confirm('Tem certeza que deseja excluir este tipo de serviço?')) return;
      const index = DB.servicos_tipos.findIndex(t => t.id === id);
      if (index === -1) return;
      if (!hasAccessToItem(DB.servicos_tipos[index])) { toast('Acesso negado.', true); return; }
      DB.servicos_tipos.splice(index, 1);
      await saveDB(DB);
      toast('Tipo de serviço removido.');
      if (servicosSubView === 'configuracoes-servicos') {
        renderServicosTab('configuracoes-servicos');
      }
    }
    window.removerTipoServico = removerTipoServico;

    function editarTipoServico(id) {
      const tipos = getTiposServico();
      const item = tipos.find(t => t.id === id);
      if (!item) { toast('Tipo de serviço não encontrado.', true); return; }

      const tag = document.getElementById('tag-tipo-servico-' + id);
      if (!tag) return;

      const textSpan = tag.querySelector('.tipo-text');
      const currentText = textSpan.textContent;

      const input = document.createElement('input');
      input.type = 'text';
      input.value = currentText;
      input.className = 'tipo-servico-edit-input';

      const btnSalvar = document.createElement('button');
      btnSalvar.textContent = '✓';
      btnSalvar.title = 'Salvar';
      btnSalvar.className = 'tipo-servico-edit-btn';

      const btnCancelar = document.createElement('button');
      btnCancelar.textContent = '✕';
      btnCancelar.title = 'Cancelar';
      btnCancelar.className = 'tipo-servico-cancel-btn';

      tag.innerHTML = '';
      tag.appendChild(input);
      tag.appendChild(btnSalvar);
      tag.appendChild(btnCancelar);

      input.focus();
      input.select();

      btnSalvar.onclick = function () {
        const novoNome = input.value.trim();
        if (!novoNome) { toast('Digite um nome válido.', true); return; }

        const tiposAtuais = getTiposServico();
        const novoNomeNorm = normalizarTexto(novoNome);
        if (tiposAtuais.some(t => t.id !== id && normalizarTexto(t.nome) === novoNomeNorm)) {
          toast('Já existe um tipo de serviço com este nome.', true);
          return;
        }

        item.nome = novoNome;
        saveDB(DB);
        toast('Tipo de serviço atualizado.');
        if (servicosSubView === 'configuracoes-servicos') {
          renderServicosTab('configuracoes-servicos');
        }
      };

      btnCancelar.onclick = function () {
        if (servicosSubView === 'configuracoes-servicos') {
          renderServicosTab('configuracoes-servicos');
        }
      };

      input.onkeydown = function (e) {
        if (e.key === 'Enter') {
          btnSalvar.click();
        } else if (e.key === 'Escape') {
          btnCancelar.click();
        }
      };
    }
    window.editarTipoServico = editarTipoServico;

    // ============================================================
    // ABA 1 — NOVO ORÇAMENTO (COM CAMPO E-MAIL REMOVIDO)
    // ============================================================

    function renderNovoOrcamento(container) {

                        <input type="text" id="f-orc-telefone" placeholder="(00) 00000-0000">

                    </div>

                <div class="f-row">
                    <div class="field2">
                        <label>Cidade</label>
                        <select id="f-orc-cidade">
                            <option value="">Selecione uma cidade</option>

                    </div>
                    <div class="field2">
                        <label>Bairro</label>
                        <input type="text" id="f-orc-bairro" placeholder="Bairro">
                    </div>
                </div>
                
                <hr style="border-color:var(--line);margin:16px 0;">
                <h4 style="font-size:14px;margin-bottom:8px;">📋 Informações do Serviço</h4>
                
                <div class="f-row">
                    <div class="field2">
                        <label>Tipo de Serviço *</label>
                        <select id="f-orc-tipo-servico" required>
                            <option value="">Selecione o tipo</option>
                            ${tiposServicoOptions}
                        </select>
                    </div>
                    <div class="field2">
                        <label>Quantidade</label>
                        <input type="number" id="f-orc-quantidade" value="1" min="1" step="1">
                    </div>
                </div>
                <div class="field2">
                    <label>Descrição Detalhada</label>
                    <textarea id="f-orc-descricao" rows="3" placeholder="Descreva detalhadamente o serviço a ser realizado"></textarea>
                </div>
                <div class="f-row">
                    <div class="field2">
                        <label>Valor Unitário (R$)</label>
                        <input type="number" id="f-orc-valor-unitario" step="0.01" placeholder="0,00" oninput="calcularTotalOrcamento()">
                    </div>
                    <div class="field2">
                        <label>Valor Total (R$)</label>
                        <input type="number" id="f-orc-valor-total" step="0.01" placeholder="0,00" readonly style="background:var(--line);cursor:default;font-weight:700;color:var(--orange);">
                    </div>
                </div>
                
                <div class="f-row">
                    <div class="field2">
                        <label>Prazo de Execução</label>
                        <div style="display:flex;gap:8px;align-items:center;">
                            <input type="number" id="f-orc-prazo" min="1" step="1" placeholder="Ex: 5" style="flex:1;">
                            <select id="f-orc-prazo-unidade" style="flex:1;max-width:120px;">
                                <option value="horas">Horas</option>
                                <option value="dias" selected>Dias</option>
                            </select>
                        </div>
                    </div>
                    <div class="field2">
                        <label>Observações</label>
                        <textarea id="f-orc-obs" rows="2" placeholder="Observações adicionais"></textarea>
                    </div>
                </div>
                
                <hr style="border-color:var(--line);margin:16px 0;">
                
                <div class="f-row">
                    <div class="field2">
                        <label>Responsável</label>
                        <input type="text" id="f-orc-responsavel" placeholder="Nome do responsável">
                    </div>
                    <div class="field2">
                        <label>Situação</label>
                        <select id="f-orc-situacao">
                            <option value="Pendente" selected>Pendente</option>
                            <option value="Aprovado">Aprovado</option>
                            <option value="Rejeitado">Rejeitado</option>
                            <option value="Agendado">Agendado</option>
                            <option value="Concluído">Concluído</option>
                            <option value="Cancelado">Cancelado</option>
                        </select>
                    </div>
                </div>
                
                <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;">
                    <button type="submit" class="btn btn-primary">💾 Salvar</button>
                    <button type="button" class="btn btn-ghost" onclick="limparFormOrcamento()">🧹 Limpar</button>
                    <button type="button" class="btn btn-danger" onclick="cancelarFormOrcamento()">✕ Cancelar</button>
                </div>
            </form>
        </div>
      `;

      container.innerHTML = html;

      const qtdInput = document.getElementById('f-orc-quantidade');
      const valorUnitInput = document.getElementById('f-orc-valor-unitario');
      if (qtdInput) qtdInput.addEventListener('input', calcularTotalOrcamento);
      if (valorUnitInput) valorUnitInput.addEventListener('input', calcularTotalOrcamento);
    }

    function calcularTotalOrcamento() {
      const qtd = parseFloat(document.getElementById('f-orc-quantidade')?.value) || 0;
      const valorUnit = parseFloat(document.getElementById('f-orc-valor-unitario')?.value) || 0;
      const total = qtd * valorUnit;
      const totalInput = document.getElementById('f-orc-valor-total');
      if (totalInput) totalInput.value = total.toFixed(2);
    }
    window.calcularTotalOrcamento = calcularTotalOrcamento;

    function limparFormOrcamento() {
      const form = document.getElementById('form-orcamento');
      if (form) form.reset();
      const campos = ['f-orc-cliente', 'f-orc-cpf', 'f-orc-telefone', 'f-orc-endereco', 'f-orc-bairro', 'f-orc-descricao', 'f-orc-obs', 'f-orc-responsavel', 'f-orc-prazo', 'f-orc-cep'];
      campos.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      const selects = ['f-orc-tipo-servico', 'f-orc-situacao', 'f-orc-cidade', 'f-orc-prazo-unidade'];
      selects.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.selectedIndex = 0;
      });
      const unidadeSelect = document.getElementById('f-orc-prazo-unidade');
      if (unidadeSelect) unidadeSelect.value = 'dias';
      const qtdEl = document.getElementById('f-orc-quantidade');
      if (qtdEl) qtdEl.value = 1;
      const valorUnitEl = document.getElementById('f-orc-valor-unitario');
      if (valorUnitEl) valorUnitEl.value = '';
      const totalEl = document.getElementById('f-orc-valor-total');
      if (totalEl) totalEl.value = '';
      const dataEl = document.getElementById('f-orc-data');
      if (dataEl) dataEl.value = todayStr();

      const orcamentos = getOrcamentos();
      const nextNumber = orcamentos.length > 0 ? Math.max(...orcamentos.map(o => parseInt(o.numero) || 0)) + 1 : 1;
      const numEl = document.getElementById('f-orc-numero');
      if (numEl) numEl.value = String(nextNumber).padStart(6, '0');

      toast('Formulário limpo.');
    }
    window.limparFormOrcamento = limparFormOrcamento;

    function cancelarFormOrcamento() {
      if (confirm('Tem certeza que deseja cancelar? Todas as informações não salvas serão perdidas.')) {
        limparFormOrcamento();
        toast('Formulário cancelado.');
      }
    }
    window.cancelarFormOrcamento = cancelarFormOrcamento;

    // ============================================================
    // SALVAR ORÇAMENTO (SEM E-MAIL)
    // ============================================================

    async function salvarOrcamento() {
      const cliente = document.getElementById('f-orc-cliente').value.trim();
      const tipoServico = document.getElementById('f-orc-tipo-servico').value;
      const valorTotal = parseFloat(document.getElementById('f-orc-valor-total').value) || 0;
      const data = document.getElementById('f-orc-data').value;
      const prazo = document.getElementById('f-orc-prazo').value.trim();
      const prazoUnidade = document.getElementById('f-orc-prazo-unidade').value;

      if (!cliente) { toast('Preencha o nome do cliente.', true); document.getElementById('f-orc-cliente').focus(); return; }
      if (!tipoServico) { toast('Selecione o tipo de serviço.', true); document.getElementById('f-orc-tipo-servico').focus(); return; }
      if (valorTotal <= 0) { toast('Informe um valor total válido.', true); document.getElementById('f-orc-valor-unitario').focus(); return; }
      if (!data) { toast('Selecione a data do orçamento.', true); document.getElementById('f-orc-data').focus(); return; }
      if (!prazo || parseInt(prazo) <= 0) { toast('Informe um prazo de execução válido.', true); document.getElementById('f-orc-prazo').focus(); return; }

      try {
        const orcamento = {
          id: uid(),
          numero: document.getElementById('f-orc-numero').value,
          data: data,
          cliente: cliente,
          cpf: document.getElementById('f-orc-cpf').value.trim(),
          telefone: document.getElementById('f-orc-telefone').value.trim(),
          endereco: document.getElementById('f-orc-endereco').value.trim(),
          cidade: document.getElementById('f-orc-cidade').value,
          bairro: document.getElementById('f-orc-bairro').value.trim(),
          cep: document.getElementById('f-orc-cep').value.trim(),
          tipoServico: tipoServico,
          descricao: document.getElementById('f-orc-descricao').value.trim(),
          quantidade: parseInt(document.getElementById('f-orc-quantidade').value) || 1,
          valorUnitario: parseFloat(document.getElementById('f-orc-valor-unitario').value) || 0,
          valorTotal: valorTotal,
          observacoes: document.getElementById('f-orc-obs').value.trim(),
          responsavel: document.getElementById('f-orc-responsavel').value.trim() || '',
          situacao: document.getElementById('f-orc-situacao').value,
          prazoExecucao: parseInt(prazo),
          prazoUnidade: prazoUnidade,
          createdAt: new Date().toISOString(),
          createdBy: getLoggedUser()?.nome || 'Sistema',
          updatedAt: new Date().toISOString(),
          updatedBy: getLoggedUser()?.nome || 'Sistema'
        };

        addOwnerId(orcamento);

        if (!DB.servicos_orcamentos) DB.servicos_orcamentos = [];
        DB.servicos_orcamentos.push(orcamento);
        await saveDB(DB);

        toast(`Orçamento #${orcamento.numero} salvo com sucesso!`);
        limparFormOrcamento();

        if (servicosSubView === 'orcamentos-gerados') {
          renderServicosTab('orcamentos-gerados');
        }
      } catch (e) {
        toast('Erro ao salvar orçamento: ' + e.message, true);
      }
    }
    window.salvarOrcamento = salvarOrcamento;

    // ============================================================
    // ABA 2 — ORÇAMENTOS GERADOS (COM BOTÃO CONFIRMAR EXECUÇÃO)
    // ============================================================

    function renderOrcamentosGerados(container) {
      const orcamentos = getOrcamentos().sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
      const cidades = getCidades();

      const html = `
        <div class="page-head" style="margin-bottom:8px;">
            <div><h1 style="font-size:18px;">📄 Orçamentos Gerados</h1>
            <div class="sub">Lista completa de todos os orçamentos criados</div></div>
            <button class="btn btn-primary btn-sm" onclick="renderServicosTab('orcamento')">+ Novo Orçamento</button>
        </div>
        <div class="toolbar">
            <div style="display:flex;flex-wrap:wrap;gap:8px;width:100%;">
                <div style="flex:1;min-width:120px;">
                    <label style="font-size:10px;text-transform:uppercase;color:var(--text-muted);">Data Inicial</label>
                    <input type="date" id="fl-orc-data-inicio" onchange="filtrarOrcamentos()" style="padding:8px 10px;width:100%;border-radius:6px;border:1px solid var(--line);background:var(--bg);color:var(--text);">
                </div>
                <div style="flex:1;min-width:120px;">
                    <label style="font-size:10px;text-transform:uppercase;color:var(--text-muted);">Data Final</label>
                    <input type="date" id="fl-orc-data-fim" onchange="filtrarOrcamentos()" style="padding:8px 10px;width:100%;border-radius:6px;border:1px solid var(--line);background:var(--bg);color:var(--text);">
                </div>
                <div style="flex:1;min-width:120px;">
                    <label style="font-size:10px;text-transform:uppercase;color:var(--text-muted);">Cidade</label>
                    <select id="fl-orc-cidade" onchange="filtrarOrcamentos()" style="padding:8px 10px;width:100%;border-radius:6px;border:1px solid var(--line);background:var(--bg);color:var(--text);">
                        <option value="">Todas</option>
                        ${cidades.map(c => `<option value="${esc(c.nome)}">${esc(c.nome)}</option>`).join('')}
                    </select>
                </div>
                <div style="flex:1;min-width:120px;">
                    <label style="font-size:10px;text-transform:uppercase;color:var(--text-muted);">Cliente</label>
                    <input type="text" id="fl-orc-cliente" placeholder="Filtrar por cliente..." oninput="filtrarOrcamentos()" style="padding:8px 10px;width:100%;border-radius:6px;border:1px solid var(--line);background:var(--bg);color:var(--text);">
                </div>
                <div style="flex:1;min-width:120px;">
                    <label style="font-size:10px;text-transform:uppercase;color:var(--text-muted);">Situação</label>
                    <select id="fl-orc-situacao" onchange="filtrarOrcamentos()" style="padding:8px 10px;width:100%;border-radius:6px;border:1px solid var(--line);background:var(--bg);color:var(--text);">
                        <option value="">Todas</option>
                        <option value="Pendente">Pendente</option>
                        <option value="Aprovado">Aprovado</option>
                        <option value="Rejeitado">Rejeitado</option>
                        <option value="Agendado">Agendado</option>
                        <option value="Concluído">Concluído</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>
                </div>
                <div style="display:flex;align-items:flex-end;gap:8px;">
                    <button class="btn btn-ghost btn-sm" onclick="limparFiltrosOrcamentos()">Limpar</button>
                </div>
            </div>
        </div>
        <div id="orcamentos-table-container">
            ${renderOrcamentosTable(orcamentos)}
        </div>
      `;

      container.innerHTML = html;
    }

    function renderOrcamentosTable(orcamentos) {
      if (!orcamentos || orcamentos.length === 0) {
        return `<div class="empty-state"><div class="big">📄</div>Nenhum orçamento gerado ainda.<br>Clique em "Novo Orçamento" para começar.</div>`;
      }

      let html = `<div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Nº</th>
                    <th>Cliente</th>
                    <th>Serviço</th>
                    <th>Valor</th>
                    <th>Data</th>
                    <th>Situação</th>
                    <th>Prazo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>`;

      orcamentos.forEach(o => {
        const situacaoClass = o.situacao === 'Pendente' ? 'badge-wait' :
          o.situacao === 'Aprovado' ? 'badge-ok' :
            o.situacao === 'Agendado' ? 'badge-mensal' :
              o.situacao === 'Concluído' ? 'badge-ok' :
                o.situacao === 'Cancelado' || o.situacao === 'Rejeitado' ? 'badge-danger' : 'badge-wait';

        const prazoLabel = o.prazoExecucao && o.prazoUnidade ?
          `${o.prazoExecucao} ${o.prazoUnidade === 'horas' ? 'h' : 'dias'}` : '—';

        const agendamentos = getAgendamentos();
        const temAgendamento = agendamentos.some(a => a.orcamentoId === o.id && (a.status === 'Agendado' || a.status === 'Em Andamento'));

        const podeConfirmarExecucao = !temAgendamento && o.situacao !== 'Concluído' && o.situacao !== 'Cancelado' && o.situacao !== 'Rejeitado';

        html += `<tr>
            <td><strong>${esc(o.numero)}</strong></td>
            <td>${esc(o.cliente)}</td>
            <td>${esc(o.tipoServico || '—')}</td>
            <td>${formatCurrency(o.valorTotal)}</td>
            <td>${fmtDate(o.data)}</td>
            <td><span class="badge ${situacaoClass}">${esc(o.situacao || 'Pendente')}</span></td>
            <td>${esc(prazoLabel)}</td>
            <td class="actions-cell">
                <button class="icon-btn" title="Visualizar" onclick="visualizarOrcamento('${o.id}')">👁</button>
                <button class="icon-btn" title="Editar" onclick="editarOrcamento('${o.id}')">✎</button>
                <button class="icon-btn" title="Excluir" onclick="excluirOrcamento('${o.id}')">🗑</button>
                <button class="icon-btn" title="Imprimir" onclick="imprimirOrcamento('${o.id}')">🖨</button>
                <button class="icon-btn" title="Gerar PDF" onclick="gerarPDFOrcamento('${o.id}')">📄</button>
                ${podeConfirmarExecucao ? `<button class="icon-btn" style="background:var(--ok);color:#fff;border-color:var(--ok);" title="Confirmar Execução" onclick="abrirModalConfirmarExecucao('${o.id}')">✅</button>` : ''}
                ${!temAgendamento && o.situacao !== 'Concluído' && o.situacao !== 'Cancelado' && o.situacao !== 'Rejeitado' ?
            `<button class="icon-btn" style="background:var(--orange);color:#fff;border-color:var(--orange);" title="Realizar Serviço" onclick="abrirModalRealizarServico('${o.id}')">▶</button>` : ''}
            </td>
        </tr>`;
      });

      html += `</tbody></table></div>`;
      return html;
    }

    // ============================================================
    // MODAL PARA CONFIRMAR EXECUÇÃO (NOVO)
    // ============================================================

    function abrirModalConfirmarExecucao(orcamentoId) {
      const orcamentos = getOrcamentos();
      const o = orcamentos.find(x => x.id === orcamentoId);
      if (!o) { toast('Orçamento não encontrado.', true); return; }

      const agendamentos = getAgendamentos();
      const existente = agendamentos.find(a => a.orcamentoId === orcamentoId && (a.status === 'Agendado' || a.status === 'Em Andamento'));
      if (existente) {
        toast('Este orçamento já possui um agendamento em aberto.', true);
        return;
      }

      const configs = servicosConfiguracoes || { responsavelPadrao: '' };
      const now = new Date();
      const dataHoje = todayStr();
      const horaAtual = now.toTimeString().slice(0, 5);

      openModal(`
        <div class="modal-head"><h3>✅ Confirmar Execução - Orçamento #${o.numero}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="modal-body">
            <div style="background:var(--bg);border-radius:6px;padding:10px;margin-bottom:12px;font-size:13px;">
                <div><span style="color:var(--text-muted);">Cliente:</span> <strong>${esc(o.cliente)}</strong></div>
                <div><span style="color:var(--text-muted);">Serviço:</span> <strong>${esc(o.tipoServico || '—')}</strong></div>
                <div><span style="color:var(--text-muted);">Valor:</span> <strong>${formatCurrency(o.valorTotal)}</strong></div>
            </div>
            <div class="f-row">
                <div class="field2">
                    <label>Data da Execução *</label>
                    <input type="date" id="f-execucao-data" value="${dataHoje}" required>
                </div>
                <div class="field2">

    async function confirmarExecucaoServico(orcamentoId) {
      const orcamentos = getOrcamentos();
      const o = orcamentos.find(x => x.id === orcamentoId);
      if (!o) { toast('Orçamento não encontrado.', true); closeModal(); return; }

      const data = document.getElementById('f-execucao-data').value;
      const hora = document.getElementById('f-execucao-hora').value;
      const observacoes = document.getElementById('f-execucao-obs').value.trim();

      if (!data) { toast('Selecione a data da execução.', true); return; }
      if (!hora) { toast('Selecione a hora da execução.', true); return; }

      const dataHoraExecucao = new Date(data + 'T' + (hora || '00:00'));
      const agora = new Date();
      if (dataHoraExecucao < agora) {
        toast('Não é possível confirmar execução para uma data/hora no passado.', true);
        return;
      }

      try {
        const agendamento = {
          id: uid(),
          orcamentoId: o.id,
          numeroOrcamento: o.numero,
          cliente: o.cliente,
          tipoServico: o.tipoServico,
          cidade: o.cidade || '',
          dataAgendamento: data,
          horaAgendamento: hora,
          responsavel: o.responsavel || '',
          equipe: '',
          observacoes: observacoes,
          status: 'Agendado',
          agendadoPor: getLoggedUser()?.nome || 'Sistema',
          dataAgendamentoCriacao: new Date().toISOString(),
          origem: 'confirmacao_execucao'
        };
        addOwnerId(agendamento);

        if (!DB.servicos_agendados) DB.servicos_agendados = [];
        DB.servicos_agendados.push(agendamento);

        const orcIndex = DB.servicos_orcamentos.findIndex(item => item.id === o.id);
        if (orcIndex !== -1) {
          DB.servicos_orcamentos.splice(orcIndex, 1);
        }

        await saveDB(DB);
        closeModal();
        toast(`✅ Serviço agendado para ${fmtDate(data)} às ${hora}. Movido para "Realizar Serviço".`);

        atualizarContadorServicos();

        if (servicosSubView === 'orcamentos-gerados') {
          renderServicosTab('orcamentos-gerados');
        }
      } catch (e) {
        toast('Erro ao confirmar execução: ' + e.message, true);
      }
    }
    window.confirmarExecucaoServico = confirmarExecucaoServico;

    function atualizarContadorServicos() {
      const agendados = getAgendamentos().filter(a => a.status === 'Agendado' || a.status === 'Em Andamento');
      const count = agendados.length;

      const menuItems = document.querySelectorAll('.nav-item[data-view="servicos_realizar"]');
      menuItems.forEach(item => {
        const existingBadge = item.querySelector('.servico-counter');
        if (existingBadge) existingBadge.remove();

        if (count > 0) {
          const badge = document.createElement('span');
          badge.className = 'servico-counter';
          badge.innerHTML = `<span class="icon">🔔</span> ${count}`;
          item.appendChild(badge);
        }
      });

      const subItems = document.querySelectorAll('.submenu .nav-item[data-view="servicos_realizar"]');
      subItems.forEach(item => {
        const existingBadge = item.querySelector('.servico-counter');
        if (existingBadge) existingBadge.remove();

        if (count > 0) {
          const badge = document.createElement('span');
          badge.className = 'servico-counter';
          badge.innerHTML = `<span class="icon">🔔</span> ${count}`;
          item.appendChild(badge);
        }
      });
    }

    async function atualizarOrcamento(id) {
      const orcamentos = getOrcamentos();
      const o = orcamentos.find(x => x.id === id);
      if (!o) { toast('Orçamento não encontrado.', true); return; }

      const cliente = document.getElementById('f-orc-cliente').value.trim();
      const tipoServico = document.getElementById('f-orc-tipo-servico').value;
      const valorTotal = parseFloat(document.getElementById('f-orc-valor-total').value) || 0;
      const data = document.getElementById('f-orc-data').value;
      const prazo = document.getElementById('f-orc-prazo').value.trim();
      const prazoUnidade = document.getElementById('f-orc-prazo-unidade').value;

      if (!cliente) { toast('Preencha o nome do cliente.', true); return; }
      if (!tipoServico) { toast('Selecione o tipo de serviço.', true); return; }
      if (valorTotal <= 0) { toast('Informe um valor total válido.', true); return; }
      if (!data) { toast('Selecione a data do orçamento.', true); return; }
      if (!prazo || parseInt(prazo) <= 0) { toast('Informe um prazo de execução válido.', true); return; }

      o.data = data;
      o.cliente = cliente;
      o.cpf = document.getElementById('f-orc-cpf').value.trim();
      o.telefone = document.getElementById('f-orc-telefone').value.trim();
      o.endereco = document.getElementById('f-orc-endereco').value.trim();
      o.cidade = document.getElementById('f-orc-cidade').value;
      o.bairro = document.getElementById('f-orc-bairro').value.trim();
      o.cep = document.getElementById('f-orc-cep').value.trim();
      o.tipoServico = tipoServico;
      o.descricao = document.getElementById('f-orc-descricao').value.trim();
      o.quantidade = parseInt(document.getElementById('f-orc-quantidade').value) || 1;
      o.valorUnitario = parseFloat(document.getElementById('f-orc-valor-unitario').value) || 0;
      o.valorTotal = valorTotal;
      o.observacoes = document.getElementById('f-orc-obs').value.trim();
      o.responsavel = document.getElementById('f-orc-responsavel').value.trim() || '';
      o.situacao = document.getElementById('f-orc-situacao').value;
      o.prazoExecucao = parseInt(prazo);
      o.prazoUnidade = prazoUnidade;
      o.updatedAt = new Date().toISOString();
      o.updatedBy = getLoggedUser()?.nome || 'Sistema';

      await saveDB(DB);
      toast(`Orçamento #${o.numero} atualizado com sucesso!`);
      limparFormOrcamento();

      const form = document.getElementById('form-orcamento');
      const btn = form.querySelector('button[type="submit"]');
      btn.textContent = '💾 Salvar';
      btn.onclick = function (e) {
        e.preventDefault();
        salvarOrcamento();
      };
      const cancelBtn = form.querySelector('button:not([type="submit"]):not([onclick*="limparFormOrcamento"]):not([onclick*="cancelarFormOrcamento"])');
      if (cancelBtn) cancelBtn.remove();

      renderServicosTab('orcamentos-gerados');
    }
    window.atualizarOrcamento = atualizarOrcamento;

      if (!hasAccessToItem(o)) { toast('Acesso negado.', true); return; }

      DB.servicos_orcamentos = DB.servicos_orcamentos.filter(x => x.id !== id);
      await saveDB(DB);
      toast(`Orçamento #${o.numero} excluído.`);

      if (servicosSubView === 'orcamentos-gerados') {
        renderServicosTab('orcamentos-gerados');
