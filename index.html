    function renderRealizarServicos(container) {
      const agendamentos = getAgendamentos().sort((a, b) => (b.dataAgendamento || '').localeCompare(a.dataAgendamento || ''));
      const hoje = todayStr();

      const servicosHoje = agendamentos.filter(a =>
        a.status === 'Agendado' &&
        a.dataAgendamento &&
        isoDateOnly(a.dataAgendamento) === hoje
      );

      atualizarContadorServicos();

      const html = `
        <div class="page-head" style="margin-bottom:8px;">
            <div><h1 style="font-size:18px;">🔧 Realizar Serviços</h1>
            <div class="sub">Acompanhe e execute os serviços agendados</div></div>
        </div>
        ${servicosHoje.length > 0 ? `
            <div style="background:var(--orange);color:#1B1D21;padding:12px 16px;border-radius:8px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
                <div>
                    <strong>📢 Você possui ${servicosHoje.length} serviço(s) programado(s) para hoje!</strong>
                </div>
                <button class="btn" style="background:#1B1D21;color:#fff;" onclick="document.getElementById('servicos-hoje').scrollIntoView({behavior:'smooth'})">
                    Ir para Serviços
                </button>
            </div>
        ` : ''}
        <div id="servicos-hoje">
            ${renderAgendamentosTable(agendamentos)}
        </div>
      `;

      container.innerHTML = html;
    }

    function renderAgendamentosTable(agendamentos) {
      const agendados = agendamentos.filter(a => a.status === 'Agendado' || a.status === 'Em Andamento');

      if (agendados.length === 0) {
        return `<div class="empty-state"><div class="big">✅</div>Todos os serviços foram concluídos ou cancelados.</div>`;
      }

      const hoje = todayStr();

      let html = `<div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Nº</th>
                    <th>Cliente</th>
                    <th>Serviço</th>
                    <th>Data</th>
                    <th>Hora</th>
                    <th>Responsável</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>`;

      agendados.forEach(a => {
        const statusClass = a.status === 'Agendado' ? 'badge-wait' : 'badge-mensal';
        const isHoje = a.dataAgendamento && isoDateOnly(a.dataAgendamento) === hoje;
        const isAtrasado = a.dataAgendamento && isoDateOnly(a.dataAgendamento) < hoje;

        let rowClass = '';
        if (isAtrasado) rowClass = 'servico-atrasado';
        else if (isHoje) rowClass = 'servico-hoje';

        html += `<tr class="${rowClass}" style="${isHoje ? 'background:rgba(255,106,19,0.08);' : ''}">
            <td><strong>${esc(a.numeroOrcamento || a.id.slice(0, 6))}</strong></td>
            <td>${esc(a.cliente)}</td>
            <td>${esc(a.tipoServico || '—')}</td>
            <td>${a.dataAgendamento ? fmtDate(a.dataAgendamento) : '—'}</td>
            <td>${esc(a.horaAgendamento || '—')}</td>
            <td>${esc(a.responsavel || '—')}</td>
            <td><span class="badge ${statusClass}">${esc(a.status || 'Agendado')}</span></td>
            <td class="actions-cell">
                <button class="icon-btn" title="Visualizar" onclick="visualizarAgendamento('${a.id}')">👁</button>
                <button class="icon-btn" title="Reagendar Serviço" onclick="abrirModalReagendar('${a.id}')" style="background:#6C63FF;color:#fff;border-color:#6C63FF;">🔄</button>
                <button class="icon-btn" style="background:var(--ok);color:#fff;border-color:var(--ok);" title="Confirmar Serviço Realizado" onclick="confirmarServicoRealizado('${a.id}')">✅</button>
            </td>
        </tr>`;
      });

      html += `</tbody></table></div>`;
      return html;
    }

    // ============================================================
    // FUNÇÃO PARA REAGENDAR SERVIÇO (NOVO)
    // ============================================================

    function abrirModalReagendar(agendamentoId) {
      const agendamentos = getAgendamentos();
      const a = agendamentos.find(x => x.id === agendamentoId);
      if (!a) { toast('Agendamento não encontrado.', true); return; }

      const dataAtual = a.dataAgendamento || todayStr();
      const horaAtual = a.horaAgendamento || '08:00';

      openModal(`
        <div class="modal-head"><h3>🔄 Reagendar Serviço</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="modal-body">
            <div style="background:var(--bg);border-radius:6px;padding:10px;margin-bottom:12px;font-size:13px;">
                <div><span style="color:var(--text-muted);">Orçamento:</span> <strong>#${esc(a.numeroOrcamento || '—')}</strong></div>
                <div><span style="color:var(--text-muted);">Cliente:</span> <strong>${esc(a.cliente)}</strong></div>
                <div><span style="color:var(--text-muted);">Serviço:</span> <strong>${esc(a.tipoServico || '—')}</strong></div>
                <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--line);">
                    <span style="color:var(--text-muted);">Agendamento atual:</span>
                    <strong>${a.dataAgendamento ? fmtDate(a.dataAgendamento) : '—'} às ${esc(a.horaAgendamento || '—')}</strong>
                </div>
            </div>
            <div class="f-row">
                <div class="field2">
                    <label>Nova Data *</label>
                    <input type="date" id="f-reagendar-data" value="${dataAtual}" required>
                </div>
                <div class="field2">
                    <label>Novo Horário *</label>
                    <input type="time" id="f-reagendar-hora" value="${horaAtual}" required>
                </div>
            </div>
            <div class="field2">
                <label>Motivo do Reagendamento</label>
                <textarea id="f-reagendar-motivo" rows="2" placeholder="Informe o motivo do reagendamento"></textarea>
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="confirmarReagendamento('${a.id}')" style="background:#6C63FF;border-color:#6C63FF;">🔄 Confirmar Reagendamento</button>
        </div>
      `);
    }
    window.abrirModalReagendar = abrirModalReagendar;

    async function confirmarReagendamento(agendamentoId) {
      const agendamentos = getAgendamentos();
      const a = agendamentos.find(x => x.id === agendamentoId);
      if (!a) { toast('Agendamento não encontrado.', true); closeModal(); return; }

      const novaData = document.getElementById('f-reagendar-data').value;
      const novaHora = document.getElementById('f-reagendar-hora').value;
      const motivo = document.getElementById('f-reagendar-motivo').value.trim();

      if (!novaData) { toast('Selecione a nova data.', true); return; }
      if (!novaHora) { toast('Selecione o novo horário.', true); return; }

      const dataHoraNova = new Date(novaData + 'T' + (novaHora || '00:00'));
      const agora = new Date();
      if (dataHoraNova < agora) {
        toast('Não é possível reagendar para uma data/hora no passado.', true);
        return;
      }

      const dataAntiga = a.dataAgendamento;
      const horaAntiga = a.horaAgendamento;

      a.dataAgendamento = novaData;
      a.horaAgendamento = novaHora;
      a.dataAgendamentoCriacao = new Date().toISOString();

      if (!a.historicoReagendamentos) a.historicoReagendamentos = [];
      a.historicoReagendamentos.push({
        data: new Date().toISOString(),
        dataAntiga: dataAntiga,
        horaAntiga: horaAntiga,
        dataNova: novaData,
        horaNova: novaHora,
        motivo: motivo || 'Não informado',
        usuario: getLoggedUser()?.nome || 'Sistema'
      });

      await saveDB(DB);
      closeModal();
      toast(`🔄 Serviço reagendado para ${fmtDate(novaData)} às ${novaHora}`);

      atualizarContadorServicos();

      if (servicosSubView === 'realizar-servicos') {
        renderServicosTab('realizar-servicos');
      }
    }
    window.confirmarReagendamento = confirmarReagendamento;

    function visualizarAgendamento(id) {
      const agendamentos = getAgendamentos();
      const a = agendamentos.find(x => x.id === id);
      if (!a) { toast('Agendamento não encontrado.', true); return; }

      let historicoHtml = '';
      if (a.historicoReagendamentos && a.historicoReagendamentos.length > 0) {
        historicoHtml = `
          <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--line);">
            <div style="font-size:11px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;">Histórico de Reagendamentos</div>
            ${a.historicoReagendamentos.map(h => `
              <div style="font-size:12px;background:var(--bg);padding:6px 10px;border-radius:4px;margin-bottom:4px;">
                <div><span style="color:var(--text-muted);">De:</span> ${h.dataAntiga ? fmtDate(h.dataAntiga) : '—'} às ${esc(h.horaAntiga || '—')}</div>
                <div><span style="color:var(--text-muted);">Para:</span> ${h.dataNova ? fmtDate(h.dataNova) : '—'} às ${esc(h.horaNova || '—')}</div>
                <div><span style="color:var(--text-muted);">Motivo:</span> ${esc(h.motivo || '—')}</div>
                <div style="font-size:10px;color:var(--text-muted);">Por: ${esc(h.usuario || '—')} em ${fmtDateTime(h.data)}</div>
              </div>
            `).join('')}
          </div>
        `;
      }

      openModal(`
        <div class="modal-head"><h3>📋 Detalhes do Agendamento</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="modal-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13px;">
                <div><span style="color:var(--text-muted);">Orçamento:</span> <strong>#${esc(a.numeroOrcamento || '—')}</strong></div>
                <div><span style="color:var(--text-muted);">Cliente:</span> <strong>${esc(a.cliente)}</strong></div>
                <div><span style="color:var(--text-muted);">Serviço:</span> <strong>${esc(a.tipoServico || '—')}</strong></div>
                <div><span style="color:var(--text-muted);">Data:</span> <strong>${a.dataAgendamento ? fmtDate(a.dataAgendamento) : '—'}</strong></div>
                <div><span style="color:var(--text-muted);">Hora:</span> <strong>${esc(a.horaAgendamento || '—')}</strong></div>
                <div><span style="color:var(--text-muted);">Responsável:</span> <strong>${esc(a.responsavel || '—')}</strong></div>
                <div style="grid-column:1/-1;"><span style="color:var(--text-muted);">Equipe:</span> <strong>${esc(a.equipe || '—')}</strong></div>
                <div style="grid-column:1/-1;"><span style="color:var(--text-muted);">Observações:</span> <strong>${esc(a.observacoes || '—')}</strong></div>
                <div style="grid-column:1/-1;"><span style="color:var(--text-muted);">Status:</span> <strong>${esc(a.status || 'Agendado')}</strong></div>
            </div>
            ${historicoHtml}
            <div style="font-size:11px;color:var(--text-muted);margin-top:12px;border-top:1px solid var(--line);padding-top:8px;">
                Agendado por: ${esc(a.agendadoPor || '—')} em ${fmtDateTime(a.dataAgendamentoCriacao)}
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
            <button class="btn btn-primary" onclick="closeModal();abrirModalReagendar('${a.id}')" style="background:#6C63FF;border-color:#6C63FF;">🔄 Reagendar</button>
            <button class="btn btn-ok" onclick="closeModal();confirmarServicoRealizado('${a.id}')">✅ Confirmar Realizado</button>
        </div>
      `);
    }
    window.visualizarAgendamento = visualizarAgendamento;

    function confirmarServicoRealizado(id) {
      const agendamentos = getAgendamentos();
      const a = agendamentos.find(x => x.id === id);
      if (!a) { toast('Agendamento não encontrado.', true); return; }

      openModal(`
        <div class="modal-head"><h3>✅ Confirmar Serviço Realizado</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="modal-body">
            <p style="font-size:15px;text-align:center;margin-bottom:8px;">
                Deseja realmente finalizar este serviço?
            </p>
            <div style="background:var(--bg);border-radius:6px;padding:12px;margin:12px 0;">
                <div style="display:flex;justify-content:space-between;padding:4px 0;">
                    <span style="color:var(--text-muted);">Orçamento:</span>
                    <strong>#${esc(a.numeroOrcamento || '—')}</strong>
                </div>
                <div style="display:flex;justify-content:space-between;padding:4px 0;">
                    <span style="color:var(--text-muted);">Cliente:</span>
                    <strong>${esc(a.cliente)}</strong>
                </div>
                <div style="display:flex;justify-content:space-between;padding:4px 0;">
                    <span style="color:var(--text-muted);">Serviço:</span>
                    <strong>${esc(a.tipoServico || '—')}</strong>
                </div>
                <div style="display:flex;justify-content:space-between;padding:4px 0;">
                    <span style="color:var(--text-muted);">Data Agendada:</span>
                    <strong>${a.dataAgendamento ? fmtDate(a.dataAgendamento) : '—'} às ${esc(a.horaAgendamento || '—')}</strong>
                </div>
            </div>
            <div class="field2">
                <label>Observações finais</label>
                <textarea id="f-conclusao-obs" rows="2" placeholder="Observações sobre a conclusão do serviço"></textarea>
            </div>
            <div class="confirm-buttons">
                <button class="btn btn-ghost" onclick="closeModal()">Não</button>
                <button class="btn btn-ok" onclick="executarConfirmacaoServico('${a.id}')">Sim</button>
            </div>
        </div>
      `);
    }
    window.confirmarServicoRealizado = confirmarServicoRealizado;

    async function executarConfirmacaoServico(id) {
      const agendamentos = getAgendamentos();
      const a = agendamentos.find(x => x.id === id);
      if (!a) { toast('Agendamento não encontrado.', true); closeModal(); return; }

      const observacoesFinais = document.getElementById('f-conclusao-obs')?.value.trim() || '';

      const dataAgendamento = new Date(a.dataAgendamento + 'T' + (a.horaAgendamento || '00:00'));
      const agora = new Date();
      const diffMs = agora - dataAgendamento;
      const diffHoras = Math.floor(diffMs / (1000 * 60 * 60));
      const diffMinutos = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
      const tempoDecorrido = `${diffHoras}h ${diffMinutos}min`;

      const conclusao = {
        id: uid(),
        orcamentoId: a.orcamentoId,
        numeroOrcamento: a.numeroOrcamento,
        cliente: a.cliente,
        tipoServico: a.tipoServico,
        cidade: a.cidade || '',
        responsavel: a.responsavel,
        equipe: a.equipe,
        dataAgendamento: a.dataAgendamento,
        horaAgendamento: a.horaAgendamento,
        dataConclusao: new Date().toISOString(),
        dataConclusaoDate: new Date().toISOString().split('T')[0],
        horaConclusao: new Date().toTimeString().slice(0, 5),
        tempoTotal: tempoDecorrido,
        observacoesFinais: observacoesFinais,
        usuarioConcluiu: getLoggedUser()?.nome || 'Sistema',
        status: 'Concluído',
        historicoReagendamentos: a.historicoReagendamentos || []
      };
      addOwnerId(conclusao);

      if (!DB.servicos_concluidos) DB.servicos_concluidos = [];
      DB.servicos_concluidos.push(conclusao);

      DB.servicos_agendados = DB.servicos_agendados.filter(x => x.id !== id);

      if (a.orcamentoId) {
        DB.servicos_orcamentos = DB.servicos_orcamentos.filter(o => o.id !== a.orcamentoId);
      }

      await saveDB(DB);
      closeModal();
      toast(`✅ Serviço concluído com sucesso! Tempo total: ${tempoDecorrido}`);

      atualizarContadorServicos();

      if (servicosSubView === 'realizar-servicos') {
        renderServicosTab('realizar-servicos');
      }
    }
    window.executarConfirmacaoServico = executarConfirmacaoServico;

    // ============================================================
    // MODAL PARA REALIZAR SERVIÇO (A PARTIR DO ORÇAMENTO)
    // ============================================================

    function abrirModalRealizarServico(orcamentoId) {
      const orcamentos = getOrcamentos();
      const o = orcamentos.find(x => x.id === orcamentoId);
      if (!o) { toast('Orçamento não encontrado.', true); return; }

      const agendamentos = getAgendamentos();
      const existente = agendamentos.find(a => a.orcamentoId === orcamentoId && (a.status === 'Agendado' || a.status === 'Em Andamento'));
      if (existente) {
        toast('Este orçamento já possui um agendamento em aberto.', true);
        return;
      }

      const configs = servicosConfiguracoes || { responsavelPadrao: '' };

      openModal(`
        <div class="modal-head"><h3>📅 Realizar Serviço - Orçamento #${o.numero}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="modal-body">
            <div style="background:var(--bg);border-radius:6px;padding:10px;margin-bottom:12px;font-size:13px;">
                <div><span style="color:var(--text-muted);">Cliente:</span> <strong>${esc(o.cliente)}</strong></div>
                <div><span style="color:var(--text-muted);">Serviço:</span> <strong>${esc(o.tipoServico || '—')}</strong></div>
                <div><span style="color:var(--text-muted);">Valor:</span> <strong>${formatCurrency(o.valorTotal)}</strong></div>
                <div><span style="color:var(--text-muted);">Prazo:</span> <strong>${o.prazoExecucao ? `${o.prazoExecucao} ${o.prazoUnidade === 'horas' ? 'Horas' : 'Dias'}` : 'Não definido'}</strong></div>
            </div>
            <div class="f-row">
                <div class="field2">
                    <label>Data do Serviço *</label>
                    <input type="date" id="f-servico-data" value="${todayStr()}" required>
                </div>
                <div class="field2">
                    <label>Hora do Serviço *</label>
                    <input type="time" id="f-servico-hora" value="${new Date().toTimeString().slice(0, 5)}" required>
                </div>
            </div>
            <div class="field2">
                <label>Responsável</label>
                <input type="text" id="f-servico-responsavel" value="${esc(configs.responsavelPadrao || '')}" placeholder="Nome do responsável">
            </div>
            <div class="field2">
                <label>Equipe</label>
                <input type="text" id="f-servico-equipe" placeholder="Membros da equipe (separados por vírgula)">
            </div>
            <div class="field2">
                <label>Observações</label>
                <textarea id="f-servico-obs" rows="2" placeholder="Observações sobre o agendamento"></textarea>
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="confirmarAgendamentoServico('${o.id}')">📅 Confirmar Agendamento</button>
        </div>
      `);
    }
    window.abrirModalRealizarServico = abrirModalRealizarServico;

    async function confirmarAgendamentoServico(orcamentoId) {
      const orcamentos = getOrcamentos();
      const o = orcamentos.find(x => x.id === orcamentoId);
      if (!o) { toast('Orçamento não encontrado.', true); closeModal(); return; }

      const data = document.getElementById('f-servico-data').value;
      const hora = document.getElementById('f-servico-hora').value;
      const responsavel = document.getElementById('f-servico-responsavel').value.trim();
      const equipe = document.getElementById('f-servico-equipe').value.trim();
      const observacoes = document.getElementById('f-servico-obs').value.trim();

      if (!data) { toast('Selecione a data do serviço.', true); return; }
      if (!hora) { toast('Selecione a hora do serviço.', true); return; }

      const dataServico = new Date(data + 'T' + (hora || '00:00'));
      const agora = new Date();
      if (dataServico < agora) {
        toast('Não é possível agendar para uma data/hora no passado.', true);
        return;
      }

      try {
        const agendamento = {
          id: uid(),
          orcamentoId: o.id,
          numeroOrcamento: o.numero,
          cliente: o.cliente,
          tipoServico: o.tipoServico,
          cidade: o.cidade || '',
          dataAgendamento: data,
          horaAgendamento: hora,
          responsavel: responsavel || o.responsavel || '',
          equipe: equipe,
          observacoes: observacoes,
          status: 'Agendado',
          agendadoPor: getLoggedUser()?.nome || 'Sistema',
          dataAgendamentoCriacao: new Date().toISOString()
        };
        addOwnerId(agendamento);

        if (!DB.servicos_agendados) DB.servicos_agendados = [];
        DB.servicos_agendados.push(agendamento);

        DB.servicos_orcamentos = DB.servicos_orcamentos.filter(item => item.id !== o.id);

        await saveDB(DB);
        closeModal();
        toast(`✅ Serviço agendado para ${fmtDate(data)} às ${hora}`);

        atualizarContadorServicos();

        if (servicosSubView === 'orcamentos-gerados' || servicosSubView === 'realizar-servicos') {
          renderServicosTab('realizar-servicos');
        }
      } catch (e) {
        toast('Erro ao confirmar agendamento: ' + e.message, true);
      }
    }
    window.confirmarAgendamentoServico = confirmarAgendamentoServico;

    // ============================================================
    // ABA 4 — SERVIÇOS CONCLUÍDOS
    // ============================================================

    function renderServicosConcluidos(container) {
      const concluidos = getConcluidos().sort((a, b) => (b.dataConclusao || '').localeCompare(a.dataConclusao || ''));

      const clientes = [...new Set(concluidos.map(c => c.cliente))].filter(Boolean).sort();
      const responsaveis = [...new Set(concluidos.map(c => c.responsavel))].filter(Boolean).sort();
      const cidades = [...new Set(concluidos.map(c => c.cidade))].filter(Boolean).sort();

      const html = `

        <div class="frota-filters">

                <select id="f-concluido-cliente" onchange="filtrarConcluidos()">

                <label>Responsável</label>
                <select id="f-concluido-responsavel" onchange="filtrarConcluidos()">

                    ${responsaveis.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join('')}
                </select>

                <label>Período Inicial</label>
                <input type="date" id="f-concluido-data-inicio" onchange="filtrarConcluidos()">
            </div>
            <div class="field2">
                <label>Período Final</label>
                <input type="date" id="f-concluido-data-fim" onchange="filtrarConcluidos()">
            </div>
            <div class="field2">
                <label>Cidade</label>
                <select id="f-concluido-cidade" onchange="filtrarConcluidos()">
                    <option value="">Todas</option>
                    ${cidades.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('')}

            </div>
            <div class="field2">
                <label>Status</label>
                <select id="f-concluido-status" onchange="filtrarConcluidos()">
                    <option value="">Todos</option>

                    <option value="Cancelado">Cancelado</option>
                </select>
            </div>

                <button class="btn btn-ghost btn-sm" onclick="filtrarConcluidos()">🔍 Filtrar</button>
                <button class="btn btn-ghost btn-sm" onclick="renderServicosTab('servicos-concluidos')">Limpar</button>
            </div>

            ${renderConcluidosTable(concluidos)}

      container.innerHTML = html;

    function renderConcluidosTable(concluidos) {
      if (!concluidos || concluidos.length === 0) {
        return `<div class="empty-state"><div class="big">✅</div>Nenhum serviço concluído ainda.</div>`;
      }

      let html = `<div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Nº</th>
                    <th>Cliente</th>
                    <th>Serviço</th>

    function filtrarConcluidos() {
      const cliente = document.getElementById('f-concluido-cliente')?.value || '';
      const responsavel = document.getElementById('f-concluido-responsavel')?.value || '';
      const dataInicio = document.getElementById('f-concluido-data-inicio')?.value || '';
      const dataFim = document.getElementById('f-concluido-data-fim')?.value || '';
      const cidade = document.getElementById('f-concluido-cidade')?.value || '';
      const status = document.getElementById('f-concluido-status')?.value || '';

      let concluidos = getConcluidos();

      if (cliente) {
        const clienteNorm = normalizarTexto(cliente);
        concluidos = concluidos.filter(c => normalizarTexto(c.cliente).includes(clienteNorm));
      }
      if (responsavel) {
        const respNorm = normalizarTexto(responsavel);
        concluidos = concluidos.filter(c => normalizarTexto(c.responsavel || '').includes(respNorm));
      }
      if (dataInicio) {
        concluidos = concluidos.filter(c => c.dataConclusao && isoDateOnly(c.dataConclusao) >= dataInicio);
      }
      if (dataFim) {
        concluidos = concluidos.filter(c => c.dataConclusao && isoDateOnly(c.dataConclusao) <= dataFim);
      }
      if (cidade) {
        const cidadeNorm = normalizarTexto(cidade);
        concluidos = concluidos.filter(c => normalizarTexto(c.cidade || '').includes(cidadeNorm));
      }
      if (status) {
        concluidos = concluidos.filter(c => c.status === status);
      }

      concluidos.sort((a, b) => (b.dataConclusao || '').localeCompare(a.dataConclusao || ''));

      const container = document.getElementById('concluidos-table-container');
      if (container) container.innerHTML = renderConcluidosTable(concluidos);
    }
    window.filtrarConcluidos = filtrarConcluidos;

    async function salvarConfiguracoesServicos() {
      try {
        const configs = {
          horarioAviso: document.getElementById('f-config-horario').value || '00:10',
          antecedencia: document.getElementById('f-config-antecedencia').value || 'no_dia',
          notificacoesAtivas: servicosConfiguracoes?.notificacoesAtivas !== undefined ? servicosConfiguracoes.notificacoesAtivas : true,
          somNotificacao: servicosConfiguracoes?.somNotificacao !== undefined ? servicosConfiguracoes.somNotificacao : true,
          notificacaoVisual: servicosConfiguracoes?.notificacaoVisual !== undefined ? servicosConfiguracoes.notificacaoVisual : true,
          responsavelPadrao: servicosConfiguracoes?.responsavelPadrao || '',
          tempoMaximoServico: servicosConfiguracoes?.tempoMaximoServico || 8,
          numeracaoAutomatica: document.getElementById('f-config-numeracao').checked,
          prefixoOrcamento: document.getElementById('f-config-prefixo').value.trim() || 'ORC-'
        };

        if (!DB.servicos_configuracoes) DB.servicos_configuracoes = [];

        const existing = DB.servicos_configuracoes.find(c => c.ownerId === getCurrentOwnerId());
        if (existing) {
          Object.assign(existing, configs);
        } else {
          const newConfig = { id: uid(), ...configs, ownerId: getCurrentOwnerId() };
          DB.servicos_configuracoes.push(newConfig);
        }

        await saveDB(DB);
        servicosConfiguracoes = configs;
        toast('Configurações salvas com sucesso!');
      } catch (e) {
        toast('Erro ao salvar configurações: ' + e.message, true);
      }
    }
    window.salvarConfiguracoesServicos = salvarConfiguracoesServicos;

    let notificacoesDisparadas = new Set();

    function verificarServicosDoDia() {
      const hoje = todayStr();
      const agora = new Date();
      const horaAtual = agora.getHours();
      const minutoAtual = agora.getMinutes();

      const agendamentos = getAgendamentos();

      const servicosHoje = agendamentos.filter(a =>
        a.status === 'Agendado' &&
        a.dataAgendamento &&
        isoDateOnly(a.dataAgendamento) === hoje
      );

      const notificacaoExistente = document.querySelector('.servicos-notificacao');
      if (notificacaoExistente) notificacaoExistente.remove();

      let notificarHoje = false;
      let mensagem = '';

      for (const servico of servicosHoje) {
        if (servico.horaAgendamento) {
          const [horaServico, minutoServico] = servico.horaAgendamento.split(':').map(Number);
          const diffMinutos = (horaServico * 60 + minutoServico) - (horaAtual * 60 + minutoAtual);

          if (diffMinutos >= -2 && diffMinutos <= 2) {
            const chaveNotificacao = `${servico.id}_${hoje}_${servico.horaAgendamento}`;
            if (!notificacoesDisparadas.has(chaveNotificacao)) {
              notificarHoje = true;
              notificacoesDisparadas.add(chaveNotificacao);
              mensagem = `🔔 Serviço para ${servico.cliente} está programado para agora (${servico.horaAgendamento})!`;
              break;
            }
          }
        }
      }

      if (notificarHoje) {
        const configs = servicosConfiguracoes || {};
        const shouldNotify = configs.notificacoesAtivas !== false;

        if (shouldNotify) {
          if (configs.somNotificacao !== false) {
            try {
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              const oscillator = audioCtx.createOscillator();
              const gainNode = audioCtx.createGain();
              oscillator.connect(gainNode);
              gainNode.connect(audioCtx.destination);
              oscillator.frequency.value = 800;
              oscillator.type = 'sine';
              gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
              oscillator.start();
              oscillator.stop(audioCtx.currentTime + 0.15);

              setTimeout(() => {
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.frequency.value = 1000;
                osc2.type = 'sine';
                gain2.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.15);
              }, 200);
            } catch (e) {
              console.log('Som não disponível');
            }
          }

          const notificacao = document.createElement('div');
          notificacao.className = 'servicos-notificacao';
          notificacao.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: var(--orange);
                color: #1B1D21;
                padding: 16px 20px;
                border-radius: 10px;
                box-shadow: 0 8px 32px rgba(0,0,0,0.2);
                z-index: 1000;
                max-width: 350px;
                animation: slideInRight 0.5s ease;
                border-left: 4px solid #1B1D21;
            `;
          notificacao.innerHTML = `
                <div style="display:flex;align-items:center;gap:12px;">
                    <div style="font-size:24px;">🔔</div>
                    <div>
                        <div style="font-weight:700;font-size:15px;">${mensagem}</div>
                        <div style="font-size:12px;">Clique em "Ver serviços" para mais detalhes.</div>
                    </div>
                </div>
                <div style="margin-top:10px;display:flex;gap:8px;">
                    <button onclick="this.closest('.servicos-notificacao').remove();renderServicosTab('realizar-servicos')" 
                            style="background:#1B1D21;color:#fff;border:none;padding:6px 16px;border-radius:6px;font-weight:600;cursor:pointer;font-size:12px;">
                        Ver serviços
                    </button>
                    <button onclick="this.closest('.servicos-notificacao').remove()" 
                            style="background:transparent;border:1px solid #1B1D21;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;color:#1B1D21;">
                        Fechar
                    </button>
                </div>
            `;

          document.body.appendChild(notificacao);

          setTimeout(() => {
            const notif = document.querySelector('.servicos-notificacao');
            if (notif) {
              notif.style.opacity = '0';
              notif.style.transition = 'opacity 0.5s ease';
              setTimeout(() => notif.remove(), 500);
            }
          }, 30000);
        }
      }

      atualizarContadorServicos();

      const chavesAntigas = Array.from(notificacoesDisparadas).filter(key => {
        const hoje2 = todayStr();
        return !key.includes(hoje2);
      });
      chavesAntigas.forEach(key => notificacoesDisparadas.delete(key));
    }

    function iniciarVerificacaoAutomatica() {
      setTimeout(verificarServicosDoDia, 2000);
      setInterval(verificarServicosDoDia, 30000);

      function agendarVerificacaoNoHorario() {
        const agora = new Date();
        const configs = servicosConfiguracoes || { horarioAviso: '00:10' };
        const [hora, minuto] = (configs.horarioAviso || '00:10').split(':').map(Number);

        const proxima = new Date(agora);
        proxima.setHours(hora, minuto, 0, 0);

        if (proxima <= agora) {
          proxima.setDate(proxima.getDate() + 1);
        }

        const diffMs = proxima - agora;
        console.log(`⏰ Próxima verificação agendada para ${proxima.toLocaleString()}`);

        setTimeout(() => {
          verificarServicosDoDia();
          agendarVerificacaoNoHorario();
        }, diffMs);
      }

      setTimeout(agendarVerificacaoNoHorario, 1000);
    }

    // ============================================================
    // INICIALIZAR MÓDULO SERVIÇOS
    // ============================================================

    async function initServicos() {
      if (!DB.servicos_orcamentos) DB.servicos_orcamentos = [];
      if (!DB.servicos_agendados) DB.servicos_agendados = [];
      if (!DB.servicos_concluidos) DB.servicos_concluidos = [];
      if (!DB.servicos_configuracoes) DB.servicos_configuracoes = [];
      if (!DB.servicos_tipos) DB.servicos_tipos = [];

      await getServicosConfiguracoes();
      atualizarContadorServicos();
      iniciarVerificacaoAutomatica();

      console.log('✅ Módulo Serviços inicializado');
    }

    // ============================================================
    // FUNÇÕES DE FILTRO PARA ORÇAMENTOS
    // ============================================================

    function filtrarOrcamentos() {
      const dataInicio = document.getElementById('fl-orc-data-inicio')?.value || '';
      const dataFim = document.getElementById('fl-orc-data-fim')?.value || '';
      const cidade = document.getElementById('fl-orc-cidade')?.value || '';
      const cliente = document.getElementById('fl-orc-cliente')?.value?.toLowerCase() || '';
      const situacao = document.getElementById('fl-orc-situacao')?.value || '';

      let orcamentos = getOrcamentos();

      if (dataInicio) {
        orcamentos = orcamentos.filter(o => o.data && o.data >= dataInicio);
      }
      if (dataFim) {
        orcamentos = orcamentos.filter(o => o.data && o.data <= dataFim);
      }
      if (cidade) {
        const cidadeNorm = normalizarTexto(cidade);
        orcamentos = orcamentos.filter(o => normalizarTexto(o.cidade || '') === cidadeNorm);
      }
      if (cliente) {
        const clienteNorm = normalizarTexto(cliente);
        orcamentos = orcamentos.filter(o => normalizarTexto(o.cliente).includes(clienteNorm));
      }
      if (situacao) {
        orcamentos = orcamentos.filter(o => o.situacao === situacao);
      }

      orcamentos.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

      const container = document.getElementById('orcamentos-table-container');
      if (container) container.innerHTML = renderOrcamentosTable(orcamentos);
    }
    window.filtrarOrcamentos = filtrarOrcamentos;

    function limparFiltrosOrcamentos() {
      const fields = ['fl-orc-data-inicio', 'fl-orc-data-fim', 'fl-orc-cidade', 'fl-orc-cliente', 'fl-orc-situacao'];
      fields.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      filtrarOrcamentos();
    }
    window.limparFiltrosOrcamentos = limparFiltrosOrcamentos;

    /* ============================================================
       INIT
    ============================================================ */

    async function init() {
      await aguardarCarregamentoDB();

      await initServicos();

      if (session) {
        const user = getLoggedUser();
        if (!user || user.bloqueado) {
          session = null;
          localStorage.removeItem(SESSION_KEY);
        }
      }

      boot();
    }

    init();
  </script>
</body>
